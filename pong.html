<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: black; }
        canvas { background: white; border: 1px solid black; }
    </style>
</head>
<body>
<canvas id="pong" width="800" height="400"></canvas>
<script>
const canvas = document.getElementById("pong");
const context = canvas.getContext("2d");

// Create the pong paddle and ball properties.
const paddleWidth = 10, paddleHeight = 100;
const ballSize = 10;
const player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: "blue", score: 0 };
const computer = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: "red", score: 0 };
const ball = { x: canvas.width / 2, y: canvas.height / 2, size: ballSize, speed: 4, velocityX: 4, velocityY: 4, color: "green" };

// Draw the paddles and ball.
function drawRect(x, y, width, height, color) {
    context.fillStyle = color;
    context.fillRect(x, y, width, height);
}

function drawArc(x, y, size, color) {
    context.fillStyle = color;
    context.beginPath();
    context.arc(x, y, size, 0, Math.PI * 2, false);
    context.closePath();
    context.fill();
}

// Move the paddles and ball.
document.addEventListener("mousemove", (event) => {
    player.y = event.clientY - paddleHeight / 2;
});

function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.speed = 4;
    ball.velocityX = 4;
    ball.velocityY = 4;
}

function update() {
    ball.x += ball.velocityX;
    ball.y += ball.velocityY;
    // AI paddle movement
    computer.y += (ball.y - (computer.y + computer.height / 2)) * 0.1;
    // Ball collision with top and bottom
    if (ball.y + ball.size > canvas.height || ball.y - ball.size < 0) {
        ball.velocityY = -ball.velocityY;
    }

    // Ball collision with paddles
    if (ball.x - ball.size < player.x + player.width && ball.y > player.y && ball.y < player.y + player.height) {
        ball.velocityX = -ball.velocityX;
    }
    if (ball.x + ball.size > computer.x && ball.y > computer.y && ball.y < computer.y + computer.height) {
        ball.velocityX = -ball.velocityX;
    }

    // Reset ball if it goes out of bounds
    if (ball.x - ball.size < 0) {
        computer.score++;
        resetBall();
    }
    if (ball.x + ball.size > canvas.width) {
        player.score++;
        resetBall();
    }
}

function render() {
    drawRect(0, 0, canvas.width, canvas.height, "black");
    drawRect(player.x, player.y, player.width, player.height, player.color);
    drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);
    drawArc(ball.x, ball.y, ball.size, ball.color);

    // Draw scores
    context.fillStyle = "white";
    context.font = "35px sans-serif";
    context.fillText(player.score, canvas.width / 4, canvas.height / 5);
    context.fillText(computer.score, 3 * canvas.width / 4, canvas.height / 5);
}

function game() {
    update();
    render();
    requestAnimationFrame(game);
}

requestAnimationFrame(game);
</script>
</body>
</html>
